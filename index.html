<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Мини CRM — Лиды</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f9fafb, #e0ecff);
    }
    .crm-card {
      border-radius: 1rem;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.05);
      background-color: #ffffff;
    }
    .status-badge {
      border-radius: 999px;
      border-width: 1px;
      padding: 0.15rem 0.6rem;
      font-size: .75rem;
    }
    .status-new { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
    .status-qualify { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .status-offer { background:#fef9c3; color:#854d0e; border-color:#facc15; }
    .status-success { background:#dcfce7; color:#166534; border-color:#4ade80; }
    .status-fail { background:#fee2e2; color:#b91c1c; border-color:#fecaca; }
    .table-hover tbody tr { cursor: pointer; }
    .tabs-pill .nav-link {
      border-radius: 999px;
      color: #4b5563;
    }
    .tabs-pill .nav-link.active {
      background-color: #ffffff;
      color: #111827;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body>
  <div class="container py-4 py-md-5">
    <!-- Header -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-4">
      <div>
        <h1 class="h3 fw-bold text-dark mb-1">CRM Система</h1>
        <p class="text-muted mb-0">Управление лидами</p>
      </div>
      <div class="d-flex gap-2">
        <a href="add-lead.html" class="btn btn-primary d-flex align-items-center gap-2">
          <span class="fw-semibold">+</span>
          <span>Добавить лид</span>
        </a>
      </div>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="crm-card p-3 h-100 d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted small mb-1">Всего лидов</p>
            <p id="statTotalLeads" class="h4 mb-0 fw-bold">0</p>
          </div>
          <div class="rounded-3 bg-primary-subtle text-primary p-3">
            <span class="fw-bold">👥</span>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="crm-card p-3 h-100 d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted small mb-1">Активных</p>
            <p id="statActiveLeads" class="h4 mb-0 fw-bold">0</p>
          </div>
          <div class="rounded-3 bg-success-subtle text-success p-3">
            <span class="fw-bold">📈</span>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="crm-card p-3 h-100 d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted small mb-1">Общая сумма</p>
            <p id="statTotalAmount" class="h4 mb-0 fw-bold">0 ₽</p>
          </div>
          <div class="rounded-3 bg-warning-subtle text-warning p-3">
            <span class="fw-bold">💰</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="crm-card p-3 p-md-4 mb-4">
      <div class="row g-3 align-items-center mb-3">
        <div class="col-12 col-md-6">
          <div class="position-relative">
            <span class="position-absolute top-50 start-0 translate-middle-y ps-3 text-muted">🔍</span>
            <input id="searchInput" type="search" class="form-control ps-5" placeholder="Поиск по ID или источнику...">
          </div>
        </div>
      </div>
      <ul class="nav nav-pills tabs-pill bg-light p-1 flex-wrap" id="statusTabs">
        <li class="nav-item mb-1">
          <button class="nav-link active py-1 px-3" data-status="all" type="button">Все</button>
        </li>
        <li class="nav-item mb-1">
          <button class="nav-link py-1 px-3" data-status="1" type="button">Новый</button>
        </li>
        <li class="nav-item mb-1">
          <button class="nav-link py-1 px-3" data-status="2" type="button">Квалификация</button>
        </li>
        <li class="nav-item mb-1">
          <button class="nav-link py-1 px-3" data-status="3" type="button">Коммерческое предложение</button>
        </li>
        <li class="nav-item mb-1">
          <button class="nav-link py-1 px-3" data-status="4" type="button">Успешно</button>
        </li>
        <li class="nav-item mb-1">
          <button class="nav-link py-1 px-3" data-status="5" type="button">Отказ</button>
        </li>
      </ul>
    </div>

    <!-- Table -->
    <div class="crm-card p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle" id="leadsTable">
          <thead class="table-light">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Источник</th>
              <th scope="col">Менеджер</th>
              <th scope="col">Статус</th>
              <th scope="col">Сумма</th>
              <th scope="col">Создан</th>
              <th scope="col">Обновлён</th>
              <th scope="col" class="text-end">Действия</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Lead actions dropdown template (Bootstrap 5 uses dropdowns) -->
  <div class="d-none">
    <div id="leadRowActionsTemplate">
      <div class="dropdown text-end">
        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          Действия
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item js-view" href="#">Просмотреть</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><button class="dropdown-item js-change-status" data-status="1" type="button">Изменить на "Новый"</button></li>
          <li><button class="dropdown-item js-change-status" data-status="2" type="button">Изменить на "Квалификация"</button></li>
          <li><button class="dropdown-item js-change-status" data-status="3" type="button">Изменить на "Коммерческое предложение"</button></li>
          <li><button class="dropdown-item js-change-status" data-status="4" type="button">Изменить на "Успешно"</button></li>
          <li><button class="dropdown-item js-change-status" data-status="5" type="button">Изменить на "Отказ"</button></li>
        </ul>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    const PIPELINE_STATUSES = [
      { id: 1, name: "Новый", active: true, isFinal: false, className: "status-new" },
      { id: 2, name: "Квалификация", active: true, isFinal: false, className: "status-qualify" },
      { id: 3, name: "Коммерческое предложение", active: true, isFinal: false, className: "status-offer" },
      { id: 4, name: "Успешно", active: true, isFinal: true, className: "status-success" },
      { id: 5, name: "Отказ", active: true, isFinal: true, className: "status-fail" },
    ];

    const MANAGERS = [
      { id: "m1", name: "Иван Петров" },
      { id: "m2", name: "Анна Смирнова" },
      { id: "m3", name: "Дмитрий Козлов" },
      { id: "m4", name: "Елена Волкова" },
    ];

    const INITIAL_LEADS = [
      {
        lead_id: "L001",
        created_at: "2026-03-10T10:30:00",
        source: "Сайт",
        manager_id: "m1",
        current_status_id: 1,
        amount: 50000,
        updated_at: "2026-03-10T10:30:00",
      },
      {
        lead_id: "L002",
        created_at: "2026-03-09T14:20:00",
        source: "Реклама",
        manager_id: "m2",
        current_status_id: 2,
        amount: 75000,
        updated_at: "2026-03-11T09:15:00",
      },
      {
        lead_id: "L003",
        created_at: "2026-03-08T16:45:00",
        source: "Звонок",
        manager_id: "m1",
        current_status_id: 3,
        amount: 120000,
        updated_at: "2026-03-12T11:30:00",
      },
      {
        lead_id: "L004",
        created_at: "2026-03-07T09:00:00",
        source: "Email",
        manager_id: "m3",
        current_status_id: 4,
        amount: 90000,
        updated_at: "2026-03-12T15:00:00",
      },
      {
        lead_id: "L005",
        created_at: "2026-03-06T13:30:00",
        source: "Социальные сети",
        manager_id: "m4",
        current_status_id: 5,
        amount: 35000,
        updated_at: "2026-03-10T10:00:00",
      },
      {
        lead_id: "L006",
        created_at: "2026-03-05T11:15:00",
        source: "Рекомендация",
        manager_id: "m2",
        current_status_id: 2,
        amount: 85000,
        updated_at: "2026-03-11T14:20:00",
      },
    ];

    function getManagerName(id) {
      const m = MANAGERS.find(m => m.id === id);
      return m ? m.name : "—";
    }

    function getStatusMeta(id) {
      return PIPELINE_STATUSES.find(s => s.id === id) || PIPELINE_STATUSES[0];
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat("ru-RU", {
        style: "currency",
        currency: "RUB",
        minimumFractionDigits: 0,
      }).format(amount);
    }

    function formatDate(d) {
      const date = new Date(d);
      return date.toLocaleString("ru-RU", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function loadLeads() {
      const stored = localStorage.getItem("crm-leads");
      if (stored) {
        try {
          return JSON.parse(stored);
        } catch {
          return INITIAL_LEADS;
        }
      }
      return INITIAL_LEADS;
    }

    function saveLeads(leads) {
      localStorage.setItem("crm-leads", JSON.stringify(leads));
    }

    function applyFilters(leads, searchQuery, statusFilter) {
      return leads.filter(lead => {
        const matchesSearch =
          lead.lead_id.toLowerCase().includes(searchQuery.toLowerCase()) ||
          lead.source.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesStatus = statusFilter === "all" || lead.current_status_id === Number(statusFilter);
        return matchesSearch && matchesStatus;
      });
    }

    function renderStats(leads) {
      const totalLeads = leads.length;
      const activeLeads = leads.filter(l => l.current_status_id < 4).length;
      const totalAmount = leads.reduce((sum, l) => sum + (l.amount || 0), 0);

      document.getElementById("statTotalLeads").textContent = totalLeads;
      document.getElementById("statActiveLeads").textContent = activeLeads;
      document.getElementById("statTotalAmount").textContent = formatCurrency(totalAmount);
    }

    function renderTable(leads, filteredLeads) {
      const tbody = document.querySelector("#leadsTable tbody");
      tbody.innerHTML = "";

      if (filteredLeads.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 8;
        td.className = "text-center py-4 text-muted";
        td.textContent = "Нет лидов";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      filteredLeads.forEach(lead => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td class="fw-semibold">${lead.lead_id}</td>
          <td>${lead.source}</td>
          <td>${getManagerName(lead.manager_id)}</td>
          <td>
            <span class="status-badge ${getStatusMeta(lead.current_status_id).className}">
              ${getStatusMeta(lead.current_status_id).name}
            </span>
          </td>
          <td class="fw-semibold">${formatCurrency(lead.amount)}</td>
          <td class="text-muted small">${formatDate(lead.created_at)}</td>
          <td class="text-muted small">${formatDate(lead.updated_at)}</td>
          <td class="text-end"></td>
        `;

        // row click -> detail page
        tr.addEventListener("click", () => {
          window.location.href = "lead.html?id=" + encodeURIComponent(lead.lead_id);
        });

        // actions dropdown
        const actionsTd = tr.querySelector("td:last-child");
        const tpl = document.getElementById("leadRowActionsTemplate");
        const actions = tpl.firstElementChild.cloneNode(true);
        actionsTd.appendChild(actions);

        actions.querySelector(".js-view").addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          window.location.href = "lead.html?id=" + encodeURIComponent(lead.lead_id);
        });

        actions.querySelectorAll(".js-change-status").forEach(btn => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const newStatus = Number(btn.getAttribute("data-status"));
            updateLeadStatus(lead.lead_id, newStatus);
          });
        });

        tbody.appendChild(tr);
      });
    }

    function updateLeadStatus(leadId, newStatusId) {
      const leads = loadLeads();
      const updated = leads.map(l => 
        l.lead_id === leadId
          ? { ...l, current_status_id: newStatusId, updated_at: new Date().toISOString() }
          : l
      );
      saveLeads(updated);
      currentLeads = updated;
      refresh();
    }

    let currentLeads = loadLeads();
    let currentSearch = "";
    let currentStatus = "all";

    function refresh() {
      const filtered = applyFilters(currentLeads, currentSearch, currentStatus);
      renderStats(currentLeads);
      renderTable(currentLeads, filtered);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", () => {
        currentSearch = searchInput.value;
        refresh();
      });

      document.querySelectorAll("#statusTabs .nav-link").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("#statusTabs .nav-link").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentStatus = btn.getAttribute("data-status") || "all";
          refresh();
        });
      });

      refresh();
    });
  </script>
</body>
</html>
