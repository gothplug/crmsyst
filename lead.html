<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Детали лида — Мини CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f9fafb, #e0ecff);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .crm-card {
      border-radius: 1rem;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.05);
      background-color: #ffffff;
    }
    .status-badge {
      border-radius: 999px;
      border-width: 1px;
      padding: 0.2rem 0.8rem;
      font-size: .8rem;
    }
    .status-new { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
    .status-qualify { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
    .status-offer { background:#fef9c3; color:#854d0e; border-color:#facc15; }
    .status-success { background:#dcfce7; color:#166534; border-color:#4ade80; }
    .status-fail { background:#fee2e2; color:#b91c1c; border-color:#fecaca; }
  </style>
</head>
<body>
  <main class="container" style="max-width: 800px;">
    <header class="d-flex align-items-center gap-3 mb-4">
      <a href="index.html" class="btn btn-outline-secondary btn-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
        ←
      </a>
      <div class="flex-grow-1">
        <h1 class="h4 fw-bold mb-1">Лид <span id="leadIdTitle"></span></h1>
        <p class="text-muted mb-0">Подробная информация</p>
      </div>
      <span id="statusBadge" class="status-badge border d-none"></span>
    </header>

    <section id="detailContent" class="crm-card p-4 mb-3 d-none">
      <div class="row g-4">
        <div class="col-md-6">
          <p class="text-muted small mb-1">Источник</p>
          <p id="detailSource" class="fw-semibold mb-0"></p>
        </div>
        <div class="col-md-6">
          <p class="text-muted small mb-1">Менеджер</p>
          <p id="detailManager" class="fw-semibold mb-0"></p>
        </div>
        <div class="col-md-6">
          <p class="text-muted small mb-1">Сумма сделки</p>
          <p id="detailAmount" class="fw-semibold mb-0"></p>
        </div>
        <div class="col-md-6">
          <p class="text-muted small mb-1">Дата создания</p>
          <p id="detailCreated" class="fw-semibold mb-0"></p>
        </div>
        <div class="col-12">
          <hr>
          <p class="text-muted small mb-1">Последнее обновление</p>
          <p id="detailUpdated" class="mb-0"></p>
        </div>
      </div>
    </section>

    <section id="statusSection" class="crm-card p-4 mb-3 d-none">
      <h2 class="h6 fw-bold mb-3">Изменить статус</h2>
      <div class="row g-3 align-items-center">
        <div class="col-md-6">
          <select id="statusSelect" class="form-select"></select>
        </div>
        <div class="col-md-6 text-md-end">
          <button id="saveStatusBtn" class="btn btn-primary">Сохранить</button>
        </div>
      </div>
    </section>

    <section id="notFound" class="crm-card p-4 text-center d-none">
      <p class="mb-3">Лид не найден</p>
      <a href="index.html" class="btn btn-primary">Вернуться к списку</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    const PIPELINE_STATUSES = [
      { id: 1, name: "Новый", className: "status-new" },
      { id: 2, name: "Квалификация", className: "status-qualify" },
      { id: 3, name: "Коммерческое предложение", className: "status-offer" },
      { id: 4, name: "Успешно", className: "status-success" },
      { id: 5, name: "Отказ", className: "status-fail" },
    ];

    const MANAGERS = [
      { id: "m1", name: "Иван Петров" },
      { id: "m2", name: "Анна Смирнова" },
      { id: "m3", name: "Дмитрий Козлов" },
      { id: "m4", name: "Елена Волкова" },
    ];

    function getManagerName(id) {
      const m = MANAGERS.find(m => m.id === id);
      return m ? m.name : "—";
    }

    function getStatusMeta(id) {
      return PIPELINE_STATUSES.find(s => s.id === id) || PIPELINE_STATUSES[0];
    }

    function loadLeads() {
      const stored = localStorage.getItem("crm-leads");
      if (!stored) return null;
      try {
        return JSON.parse(stored);
      } catch {
        return null;
      }
    }

    function saveLeads(leads) {
      localStorage.setItem("crm-leads", JSON.stringify(leads));
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat("ru-RU", {
        style: "currency",
        currency: "RUB",
        minimumFractionDigits: 0,
      }).format(amount);
    }

    function formatDate(d) {
      const date = new Date(d);
      return date.toLocaleString("ru-RU", {
        day: "2-digit",
        month: "long",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const leadId = getQueryParam("id");
      const titleEl = document.getElementById("leadIdTitle");
      const notFound = document.getElementById("notFound");
      const detailContent = document.getElementById("detailContent");
      const statusSection = document.getElementById("statusSection");
      const statusBadge = document.getElementById("statusBadge");

      if (!leadId) {
        notFound.classList.remove("d-none");
        return;
      }

      titleEl.textContent = leadId;

      const leads = loadLeads() || [];
      const lead = leads.find(l => l.lead_id === leadId);

      if (!lead) {
        notFound.classList.remove("d-none");
        return;
      }

      const statusMeta = getStatusMeta(lead.current_status_id);
      statusBadge.textContent = statusMeta.name;
      statusBadge.classList.remove("d-none");
      statusBadge.classList.add("border", statusMeta.className);

      document.getElementById("detailSource").textContent = lead.source;
      document.getElementById("detailManager").textContent = getManagerName(lead.manager_id);
      document.getElementById("detailAmount").textContent = formatCurrency(lead.amount);
      document.getElementById("detailCreated").textContent = formatDate(lead.created_at);
      document.getElementById("detailUpdated").textContent = formatDate(lead.updated_at);

      detailContent.classList.remove("d-none");
      statusSection.classList.remove("d-none");

      const statusSelect = document.getElementById("statusSelect");
      PIPELINE_STATUSES.forEach(s => {
        const opt = document.createElement("option");
        opt.value = String(s.id);
        opt.textContent = s.name;
        statusSelect.appendChild(opt);
      });
      statusSelect.value = String(lead.current_status_id);

      document.getElementById("saveStatusBtn").addEventListener("click", () => {
        const newStatusId = Number(statusSelect.value);
        const updatedLeads = leads.map(l =>
          l.lead_id === leadId
            ? { ...l, current_status_id: newStatusId, updated_at: new Date().toISOString() }
            : l
        );
        saveLeads(updatedLeads);

        const meta = getStatusMeta(newStatusId);
        statusBadge.textContent = meta.name;
        PIPELINE_STATUSES.forEach(s => statusBadge.classList.remove(s.className));
        statusBadge.classList.add(meta.className);
        document.getElementById("detailUpdated").textContent = formatDate(new Date().toISOString());
      });
    });
  </script>
</body>
</html>
