<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Новый лид — Мини CRM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f9fafb, #e0ecff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .crm-card {
      border-radius: 1rem;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.05);
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <main class="container" style="max-width: 640px;">
    <header class="d-flex align-items-center gap-3 mb-4">
      <a href="index.html" class="btn btn-outline-secondary btn-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
        ←
      </a>
      <div>
        <h1 class="h4 fw-bold mb-1">Новый лид</h1>
        <p class="text-muted mb-0">Заполните информацию о лиде</p>
      </div>
    </header>

    <section class="crm-card p-4">
      <form id="addLeadForm" class="row g-3">
        <div class="col-12">
          <label for="source" class="form-label">Источник</label>
          <select id="source" class="form-select" required>
            <option value="" selected disabled>Выберите источник</option>
          </select>
        </div>

        <div class="col-12">
          <label for="manager" class="form-label">Менеджер</label>
          <select id="manager" class="form-select" required>
            <option value="" selected disabled>Выберите менеджера</option>
          </select>
        </div>

        <div class="col-12">
          <label for="amount" class="form-label">Сумма сделки (₽)</label>
          <input type="number" id="amount" class="form-control" min="0" step="0.01" placeholder="0.00" required>
        </div>

        <div class="col-12 d-flex justify-content-end gap-2 pt-3 border-top mt-2">
          <a href="index.html" class="btn btn-outline-secondary">Отмена</a>
          <button type="submit" class="btn btn-primary">Создать лид</button>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    const SOURCES = [
      "Сайт",
      "Реклама",
      "Звонок",
      "Email",
      "Социальные сети",
      "Рекомендация",
    ];

    const MANAGERS = [
      { id: "m1", name: "Иван Петров" },
      { id: "m2", name: "Анна Смирнова" },
      { id: "m3", name: "Дмитрий Козлов" },
      { id: "m4", name: "Елена Волкова" },
    ];

    function loadLeads() {
      const stored = localStorage.getItem("crm-leads");
      if (!stored) return null;
      try {
        return JSON.parse(stored);
      } catch {
        return null;
      }
    }

    function saveLeads(leads) {
      localStorage.setItem("crm-leads", JSON.stringify(leads));
    }

    document.addEventListener("DOMContentLoaded", () => {
      const selectSource = document.getElementById("source");
      const selectManager = document.getElementById("manager");

      SOURCES.forEach(src => {
        const opt = document.createElement("option");
        opt.value = src;
        opt.textContent = src;
        selectSource.appendChild(opt);
      });

      MANAGERS.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.name;
        selectManager.appendChild(opt);
      });

      document.getElementById("addLeadForm").addEventListener("submit", (e) => {
        e.preventDefault();

        const sourceValue = selectSource.value;
        const managerId = selectManager.value;
        const amountValue = document.getElementById("amount").value;

        const newLead = {
          lead_id: "L" + String(Date.now()).slice(-6),
          created_at: new Date().toISOString(),
          source: sourceValue,
          manager_id: managerId,
          current_status_id: 1,
          amount: parseFloat(amountValue) || 0,
          updated_at: new Date().toISOString(),
        };

        const existing = loadLeads();
        const leads = existing && Array.isArray(existing) ? existing : [];
        const updated = [newLead, ...leads];
        saveLeads(updated);

        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
